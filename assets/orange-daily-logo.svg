<svg viewBox="0 0 168 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Orange gradient for realistic fruit -->
    <radialGradient id="orangeGrad" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#FFB54D"/>
      <stop offset="50%" stop-color="#FF8C00"/>
      <stop offset="100%" stop-color="#E07000"/>
    </radialGradient>
    <!-- Texture pattern for orange skin -->
    <pattern id="orangeTexture" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="0.8" fill="#E08000" opacity="0.3"/>
      <circle cx="6" cy="6" r="0.8" fill="#E08000" opacity="0.3"/>
    </pattern>
  </defs>
  
  <!-- Blue background -->
  <rect x="0" y="0" width="168" height="280" fill="#009ee8"/>
  
  <!-- Orange bottom bar -->
  <rect x="0" y="280" width="168" height="20" fill="#FF8C00"/>
  
  <!-- ORANGE DAILY text at bottom -->
  <text x="84" y="294" font-family="Arial Black, Arial, sans-serif" font-size="11" font-weight="900" fill="white" text-anchor="middle" letter-spacing="1.5">ORANGE DAILY</text>
  
  <!-- Orange fruit body (rounder than apple) -->
  <ellipse cx="84" cy="85" rx="58" ry="55" fill="url(#orangeGrad)"/>
  <!-- Orange texture overlay -->
  <ellipse cx="84" cy="85" rx="58" ry="55" fill="url(#orangeTexture)"/>
  
  <!-- Bite mark (top right) -->
  <path d="M 125 50 
           Q 155 75, 145 110 
           Q 132 85, 125 50" 
        fill="#009ee8"/>
  
  <!-- Subtle highlight on orange -->
  <ellipse cx="60" cy="65" rx="18" ry="12" fill="white" opacity="0.25"/>
  
  <!-- Stem -->
  <rect x="80" y="22" width="8" height="14" rx="2" fill="#5D4037"/>
  
  <!-- Leaf -->
  <path d="M 88 28 Q 115 8, 135 20 Q 112 35, 88 28" fill="#4CAF50"/>
  <path d="M 92 26 Q 110 18, 125 22" stroke="#2E7D32" stroke-width="1.5" fill="none"/>
  
  <!-- Small leaf accent -->
  <path d="M 80 30 Q 60 15, 50 22 Q 65 32, 80 30" fill="#66BB6A"/>
  
  <!-- Chinese characters: 橙果 (right side, vertical) -->
  <text x="138" y="175" font-family="Noto Sans TC, Microsoft JhengHei, Heiti TC, PingFang TC, sans-serif" font-size="42" font-weight="900" fill="white">橙</text>
  <text x="138" y="222" font-family="Noto Sans TC, Microsoft JhengHei, Heiti TC, PingFang TC, sans-serif" font-size="42" font-weight="900" fill="white">果</text>
  
  <!-- Chinese characters: 日報 (left side, vertical) -->
  <text x="25" y="175" font-family="Noto Sans TC, Microsoft JhengHei, Heiti TC, PingFang TC, sans-serif" font-size="42" font-weight="900" fill="white">日</text>
  <text x="25" y="222" font-family="Noto Sans TC, Microsoft JhengHei, Heiti TC, PingFang TC, sans-serif" font-size="42" font-weight="900" fill="white">報</text>
</svg>