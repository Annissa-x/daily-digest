<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280">
  <defs>
    <!-- Orange gradient -->
    <radialGradient id="orangeGrad" cx="35%" cy="30%" r="65%">
      <stop offset="0%" style="stop-color:#FFB84D"/>
      <stop offset="60%" style="stop-color:#FF8C00"/>
      <stop offset="100%" style="stop-color:#E07000"/>
    </radialGradient>
  </defs>
  
  <!-- Blue background -->
  <rect width="200" height="280" fill="#00A0E9"/>
  
  <!-- Orange fruit body -->
  <ellipse cx="100" cy="95" rx="70" ry="68" fill="url(#orangeGrad)"/>
  
  <!-- Bite mark (top right) -->
  <path d="M 145 45 
           Q 175 70, 168 105 
           Q 155 80, 145 45" 
        fill="#00A0E9"/>
  
  <!-- Stem -->
  <rect x="95" y="22" width="10" height="16" rx="2" fill="#4A3728"/>
  
  <!-- Leaf -->
  <path d="M 105 30 
           Q 135 8, 155 18 
           Q 135 32, 105 30" 
        fill="#2E8B2E"/>
  
  <!-- Chinese characters - vertical layout -->
  <!-- Right side: 橙果 -->
  <text x="150" y="195" font-family="Noto Sans TC, Microsoft JhengHei, Heiti TC, sans-serif" font-size="48" font-weight="900" fill="white">橙</text>
  <text x="150" y="248" font-family="Noto Sans TC, Microsoft JhengHei, Heiti TC, sans-serif" font-size="48" font-weight="900" fill="white">果</text>
  
  <!-- Left side: 日報 -->
  <text x="45" y="195" font-family="Noto Sans TC, Microsoft JhengHei, Heiti TC, sans-serif" font-size="48" font-weight="900" fill="white">日</text>
  <text x="45" y="248" font-family="Noto Sans TC, Microsoft JhengHei, Heiti TC, sans-serif" font-size="48" font-weight="900" fill="white">報</text>
  
  <!-- ORANGE DAILY text at bottom -->
  <text x="100" y="273" font-family="Arial Black, Arial, sans-serif" font-size="16" font-weight="900" fill="white" text-anchor="middle" letter-spacing="1">ORANGE DAILY</text>
</svg>