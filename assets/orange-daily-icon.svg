<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Orange gradient -->
    <radialGradient id="orangeGrad" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#FFB54D"/>
      <stop offset="50%" stop-color="#FF8C00"/>
      <stop offset="100%" stop-color="#E07000"/>
    </radialGradient>
    <!-- Texture pattern -->
    <pattern id="orangeTexture" x="0" y="0" width="10" height="10" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="3" r="1" fill="#E08000" opacity="0.25"/>
      <circle cx="8" cy="8" r="1" fill="#E08000" opacity="0.25"/>
    </pattern>
  </defs>
  
  <!-- Blue background -->
  <rect width="200" height="200" fill="#009ee8"/>
  
  <!-- Orange fruit body -->
  <ellipse cx="100" cy="108" rx="72" ry="68" fill="url(#orangeGrad)"/>
  <ellipse cx="100" cy="108" rx="72" ry="68" fill="url(#orangeTexture)"/>
  
  <!-- Bite mark -->
  <path d="M 152 60 
           Q 190 95, 175 140 
           Q 158 105, 152 60" 
        fill="#009ee8"/>
  
  <!-- Highlight -->
  <ellipse cx="70" cy="85" rx="22" ry="15" fill="white" opacity="0.25"/>
  
  <!-- Stem -->
  <rect x="94" y="30" width="10" height="18" rx="3" fill="#5D4037"/>
  
  <!-- Leaves -->
  <path d="M 104 38 Q 140 12, 165 28 Q 138 48, 104 38" fill="#4CAF50"/>
  <path d="M 110 34 Q 135 22, 155 30" stroke="#2E7D32" stroke-width="2" fill="none"/>
  <path d="M 94 40 Q 65 20, 50 30 Q 72 45, 94 40" fill="#66BB6A"/>
</svg>