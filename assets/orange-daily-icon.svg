<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <!-- Orange gradient -->
    <radialGradient id="orangeGrad" cx="35%" cy="30%" r="65%">
      <stop offset="0%" style="stop-color:#FFB84D"/>
      <stop offset="60%" style="stop-color:#FF8C00"/>
      <stop offset="100%" style="stop-color:#E07000"/>
    </radialGradient>
  </defs>
  
  <!-- Blue background -->
  <rect width="200" height="200" fill="#00A0E9"/>
  
  <!-- Orange fruit body -->
  <ellipse cx="100" cy="110" rx="75" ry="72" fill="url(#orangeGrad)"/>
  
  <!-- Bite mark (top right) -->
  <path d="M 150 55 
           Q 185 85, 175 125 
           Q 160 95, 150 55" 
        fill="#00A0E9"/>
  
  <!-- Stem -->
  <rect x="94" y="30" width="12" height="18" rx="3" fill="#4A3728"/>
  
  <!-- Leaf -->
  <path d="M 106 38 
           Q 145 12, 168 25 
           Q 142 42, 106 38" 
        fill="#2E8B2E"/>
</svg>