<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <!-- Orange gradient -->
    <radialGradient id="orangeGrad" cx="40%" cy="30%" r="60%">
      <stop offset="0%" style="stop-color:#FFB347"/>
      <stop offset="70%" style="stop-color:#FF8C00"/>
      <stop offset="100%" style="stop-color:#E86100"/>
    </radialGradient>
    <!-- Leaf gradient -->
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4CAF50"/>
      <stop offset="100%" style="stop-color:#2E7D32"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="200" height="200" fill="white"/>
  
  <!-- Orange fruit body -->
  <circle cx="100" cy="110" r="75" fill="url(#orangeGrad)"/>
  
  <!-- Bite mark -->
  <path d="M 155 65 
           Q 185 95, 172 135 
           Q 162 110, 155 65" 
        fill="white"/>
  
  <!-- Orange texture lines -->
  <path d="M 50 85 Q 100 78, 145 95" stroke="#E07000" stroke-width="1.5" fill="none" opacity="0.3"/>
  <path d="M 40 115 Q 100 105, 155 120" stroke="#E07000" stroke-width="1.5" fill="none" opacity="0.3"/>
  <path d="M 50 145 Q 100 138, 145 152" stroke="#E07000" stroke-width="1.5" fill="none" opacity="0.3"/>
  
  <!-- Stem -->
  <rect x="94" y="28" width="10" height="18" rx="3" fill="#5D4037"/>
  
  <!-- Leaf -->
  <path d="M 104 38 
           Q 140 15, 160 28 
           Q 138 42, 104 38" 
        fill="url(#leafGrad)"/>
  <!-- Leaf vein -->
  <path d="M 110 35 Q 132 28, 150 32" stroke="#1B5E20" stroke-width="1.5" fill="none" opacity="0.5"/>
</svg>